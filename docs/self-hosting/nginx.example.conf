server {
    listen 80;
    server_name api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.example.com;

    root /var/www/api.example.com;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location /api/v3/file/ {
        alias /var/www/api.example.com/generator/;
        autoindex off;
    }

    location /api/v3/fetch/ {
        try_files $uri $uri/ /api/v3/fetch/index.php?$args;
    }

    location /generator/ {
        if ($arg_token != "<set-random-token>") { return 403; }
        alias /var/www/api.example.com/generator/;
        autoindex off;
        index index.html index.php;
    }

    # The current client expects a directory listing here.
    location /bypasses/ {
        if ($http_x_secret_key != "<set-shared-secret>") { return 403; }
        autoindex on;
    }

    location /SDBypass/ {
        if ($http_x_secret_key != "<set-shared-secret>") { return 403; }
        autoindex on;
    }

    location /SDBypass/lang/ {
        if ($http_x_secret_key != "<set-shared-secret>") { return 403; }
        autoindex on;
    }

    location /SDBypass/update/ {
        if ($http_x_secret_key != "<set-shared-secret>") { return 403; }
        autoindex on;
    }

    location ~ /\.ht {
        deny all;
    }
}
